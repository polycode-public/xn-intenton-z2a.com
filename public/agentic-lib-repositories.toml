# agentic-lib-repositories.toml — Showcase repository configuration
# Used by index.html to populate the multi-repo showcase bar + the marginalia
# chat embed. The embed needs only `name` (the repo slug) and `label`; the chat is
# seeded from each repo's CI-exported summary at
#   https://raw.githubusercontent.com/<owner>/<slug>/agentic-lib-logs/summary.json
#
# To add a repository: add a [[repositories]] block with its slug + a short label.

[owner]
name = "polycode-public"

# repository0 is the template, not a fleet instance — it is reached via the
# "Create your own" CTA, not listed in the rotating repo-bar.

[[repositories]]
name = "8-kyu-remember-hello-world"
label = "hello-world"

[[repositories]]
name = "6-kyu-understand-roman-numerals"
label = "roman-numerals"

[[repositories]]
name = "3-kyu-analyze-lunar-lander"
label = "lunar-lander"

[[repositories]]
name = "2-kyu-create-markdown-compiler"
label = "markdown-compiler"
